name: Compile Wine TkG wow64 (auto)

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Wine release tag（可选，例如：wine-9.22，不填则使用最新tag）"
        required: false
        type: string
      tkg:
        description: "Wine TkG仓库分支"
        required: false
        type: string
      enable_mf:
        description: "启用 Proton MF 解码"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 1 * * *" # 每日 01:00 检查一次（UTC 时间）

jobs:
  BCC:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 使用 cache 保存上一次看到的 tag
      - name: Restore last wine release tag from cache
        id: cache-tag
        uses: actions/cache@v4
        with:
          path: .wine_last_tag
          key: wine-last-tag

      - name: Get latest wine tag
        id: wine-mirror
        env:
          CUSTOM_TAG: ${{ github.event.inputs.tag }}
          ENABLE_MF: ${{ github.event.inputs.enable_mf || 'false' }}
        run: |
          if [ -n "$CUSTOM_TAG" ]; then
            echo "Use custom tag from manual dispatch: $CUSTOM_TAG"
            latest_tag="$CUSTOM_TAG"
          else
            # 获取 wine-mirror/wine 的最新标签
            latest_tag=$(git ls-remote --tags https://github.com/wine-mirror/wine.git | \
              grep -Ev '\^\{\}$' | sed 's/.*\///' | grep -E '^wine-[0-9]+\.[0-9]+.*$' | sort -V | tail -n 1)
          fi

          if [ -z "$latest_tag" ]; then
            echo "❌ Failed to get latest Wine tag!"
            exit 1
          fi

          echo "Latest Wine tag: $latest_tag"
          echo "$latest_tag" > .wine_current_tag
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "enable_mf=$ENABLE_MF" >> "$GITHUB_OUTPUT"

      - name: Read last saved tag (if any)
        id: last
        run: |
          if [ -f .wine_last_tag ]; then
            last_tag=$(cat .wine_last_tag)
          else
            last_tag=""
          fi
          echo "Last Wine tag: $last_tag"
          echo "tag=$last_tag" >> "$GITHUB_OUTPUT"

      - name: Compare tags and decide whether to run build
        id: need_build
        run: |
          event_name="${{ github.event_name }}"

          if [ "$event_name" = "workflow_dispatch" ]; then
            echo "Manual dispatch, force build."
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            current_tag="${{ steps.wine-mirror.outputs.tag }}"
            last_tag="${{ steps.last.outputs.tag }}"
            if [ "$current_tag" != "$last_tag" ]; then
              echo "New release detected: $current_tag (was $last_tag)"
              echo "new_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "No change in Wine tag, skip build."
              echo "new_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # 只有需要构建时才执行后续步骤
      - name: Set build variables
        if: steps.need_build.outputs.new_release == 'true'
        id: wine_tag
        run: |
          wine_tag="${{ steps.wine-mirror.outputs.tag }}"
          wine_ver="${wine_tag#wine-}"
          pkg_name=""
          if [[ "${{ steps.wine-mirror.outputs.enable_mf }}" == "true" ]]; then
            pkg_name="mf"
          fi

          echo "wine_tag=$wine_tag" >> "$GITHUB_OUTPUT"
          echo "wine_ver=$wine_ver" >> "$GITHUB_OUTPUT"
          echo "PKG_NAME=$pkg_name" >> "$GITHUB_OUTPUT"

      - name: Clone project & setup rootfs
        if: steps.need_build.outputs.new_release == 'true'
        run: |
          echo "Using Wine tag: ${{ steps.wine_tag.outputs.wine_tag }}"

          cat > ~/.gitconfig << EOF
          [fetch]
            parallel = $(nproc)
          [submodule]
            fetchJobs = $(nproc)
          EOF

          # 克隆 TkG 项目
          tkg_branch="${{ github.event.inputs.tkg }}"
          if [ -z "$tkg_branch" ]; then
            git clone https://github.com/Frogging-Family/wine-tkg-git.git
          else
            git clone -b "$tkg_branch" https://github.com/Frogging-Family/wine-tkg-git.git
          fi

          cd /tmp

          # 下载 BCC 根文件系统
          aria2c -s$(nproc) -x$(nproc) https://github.com/Waim908/BCC/releases/download/wine-bcc-latest/wine-bcc.tar.xz

          # 解压并验证
          sudo tar xf wine-bcc.tar.xz || { echo "❌ Extract failed"; exit 1; }

          if [ ! -d "archlinux" ]; then
            echo "❌ Expected 'archlinux' directory not found after extract!"
            exit 1
          fi

          # 移动项目到 rootfs
          sudo mv "$GITHUB_WORKSPACE/wine-tkg-git" archlinux/tmp/
          sudo cp -r -p "$GITHUB_WORKSPACE/"* archlinux/tmp/

          # ========== 修复：创建 /tmp/wine-termux 目录并复制脚本 ==========
          echo "Creating /tmp/wine-termux directory with required scripts..."
          sudo mkdir -p /tmp/archlinux/tmp/wine-termux
          
          # 从仓库根目录复制必要的脚本
          if [ -f "$GITHUB_WORKSPACE/patch.sh" ]; then
            sudo cp "$GITHUB_WORKSPACE/patch.sh" /tmp/archlinux/tmp/wine-termux/
            echo "✅ Copied patch.sh"
          else
            echo "❌ patch.sh not found in repository root!"
            exit 1
          fi
          
          if [ -f "$GITHUB_WORKSPACE/set-tkg-cfg.sh" ]; then
            sudo cp "$GITHUB_WORKSPACE/set-tkg-cfg.sh" /tmp/archlinux/tmp/wine-termux/
            echo "✅ Copied set-tkg-cfg.sh"
          else
            echo "❌ set-tkg-cfg.sh not found in repository root!"
            exit 1
          fi
          
          # 确保脚本可执行
          sudo chmod +x /tmp/archlinux/tmp/wine-termux/*.sh
          
          # 验证文件存在
          echo "Contents of /tmp/wine-termux:"
          sudo ls -la /tmp/archlinux/tmp/wine-termux/
          # ============================================================

          # 创建构建脚本
          cat > build-wine.sh << 'EOF'
          #!/bin/bash
          set -e
          mkdir -p ~/.cache

          # 检查必要的脚本是否存在
          if [ ! -f /tmp/wine-termux/patch.sh ]; then
            echo "❌ /tmp/wine-termux/patch.sh not found!"
            exit 1
          fi
          if [ ! -f /tmp/wine-termux/set-tkg-cfg.sh ]; then
            echo "❌ /tmp/wine-termux/set-tkg-cfg.sh not found!"
            exit 1
          fi

          # 加载 ccache
          if [ -f /tmp/ccache.tar.xz ]; then
            echo "✅ Using cached ccache..."
            mkdir -p ~/.cache/ccache
            tar xvf /tmp/ccache.tar.xz -C ~/.cache/
          fi

          export USE_CACHE=1
          export ENABLE_PROTON_MF=${{ steps.wine-mirror.outputs.enable_mf }}

          cd /tmp/wine-tkg-git/wine-tkg-git/

          bash -x /tmp/wine-termux/patch.sh wine-tkg-auto "${{ steps.wine_tag.outputs.wine_tag }}" /tmp/wine-tkg-git/wine-tkg-git/wine-tkg-userpatches || exit 1
          bash -x /tmp/wine-termux/set-tkg-cfg.sh "${{ steps.wine_tag.outputs.wine_tag }}" /tmp/wine-tkg-git/wine-tkg-git || exit 1

          echo '_ci_build="true"' >> customization.cfg

          yes | ./non-makepkg-build.sh || exit 1

          cd /tmp/output/

          tar -I 'xz -T$(nproc) -9' -cvf "/tmp/wine-${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }}-tkg-stg-ge.tar.xz" */

          cd ~/.cache/
          rm -rf /tmp/ccache.tar.xz
          tar -I 'xz -T$(nproc)' -cvf /tmp/ccache.tar.xz ccache

          echo "✅ Build completed and ccache archived."
          EOF

          sudo chmod +x build-wine.sh
          sudo mv build-wine.sh archlinux/bin/build-wine.sh

      # --- ccache 缓存恢复 ---
      - name: Restore ccache
        if: steps.need_build.outputs.new_release == 'true'
        uses: actions/cache/restore@v5
        with:
          path: /tmp/archlinux/tmp/ccache.tar.xz
          key: wine-tkg-ccache-Linux-x86_64
          restore-keys: |
            wine-tkg-ccache-Linux-x86_64

      - name: Compile Using BCC Chroot
        if: steps.need_build.outputs.new_release == 'true'
        run: |
          cd /tmp
          bash "$GITHUB_WORKSPACE/mount.sh" archlinux mount
          sudo chroot archlinux /bin/build-wine.sh
          bash "$GITHUB_WORKSPACE/mount.sh" archlinux unmount

          # 确保生成产物存在
          if [ ! -f "/tmp/archlinux/tmp/wine-${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }}-tkg-stg-ge.tar.xz" ]; then
            echo "❌ Build output not found!"
            exit 1
          fi

          sudo chmod 644 "/tmp/archlinux/tmp/wine-${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }}-tkg-stg-ge.tar.xz"
          sudo chmod 644 /tmp/archlinux/tmp/ccache.tar.xz

      # --- 保存 ccache 缓存 ---
      - name: Save ccache
        if: steps.need_build.outputs.new_release == 'true' && github.run_attempt == 1
        uses: actions/cache/save@v5
        with:
          path: /tmp/archlinux/tmp/ccache.tar.xz
          key: wine-tkg-ccache-Linux-x86_64

      - name: Upload Source to wine-termux
        if: steps.need_build.outputs.new_release == 'true'
        run: |
          src_dir="/tmp/archlinux/tmp/wine-tkg/src/wine-git"
          if [ ! -d "$src_dir" ]; then
            echo "❌ Source directory not found: $src_dir"
            exit 1
          fi

          sudo chown -R $USER:$USER /tmp/archlinux/tmp/wine-tkg/src/wine-git
          cd /tmp/archlinux/tmp/wine-tkg/src/wine-git/
          sudo cp -r -p /tmp/archlinux/tmp/output/*/share/wine/wine-tkg-config.txt .
          sudo chmod 644 wine-tkg-config.txt
          sudo rm -rf .git

          cd "$src_dir"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch_name="${{ steps.wine_tag.outputs.wine_ver }}${{ steps.wine_tag.outputs.PKG_NAME }}"
          git checkout -b "$branch_name"

          git add .
          git commit -m "Auto-commit source for ${{ steps.wine_tag.outputs.wine_tag }} (PKG: ${{ steps.wine_tag.outputs.PKG_NAME }})"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Waim908/wine-termux.git
          git push -f --set-upstream origin "$branch_name"

      - name: Create GitHub Release
        if: steps.need_build.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target_commitish: ${{ steps.wine_tag.outputs.wine_ver }}${{ steps.wine_tag.outputs.PKG_NAME }}
          tag_name: ${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }}
          name: Wine ${{ steps.wine_tag.outputs.wine_ver }} (${{ steps.wine_tag.outputs.PKG_NAME == 'mf' && 'mf' || 'dxgi' }}) TkG Staging GE
          body: |
            自动编译版本。
            [源码](https://github.com/Waim908/wine-termux/tree/${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }})
          files: /tmp/archlinux/tmp/wine-${{ steps.wine_tag.outputs.wine_ver }}-${{ steps.wine_tag.outputs.PKG_NAME }}-tkg-stg-ge.tar.xz
          draft: false
          prerelease: false

      - name: Save current tag to cache file
        if: steps.need_build.outputs.new_release == 'true'
        run: |
          cp .wine_current_tag .wine_last_tag

      - name: Update tag cache
        if: steps.need_build.outputs.new_release == 'true'
        uses: actions/cache@v4
        with:
          path: .wine_last_tag
          key: wine-last-tag
